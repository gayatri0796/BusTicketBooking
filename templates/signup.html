{% extends "homepage.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh; background: linear-gradient(to right, #a7c2ec, #d4bde9);">
  <div class="signup-card bg-white p-4 shadow rounded" style="max-width: 450px; width: 100%;">
    <h2 class="text-center mb-4">Create an Account</h2>
    <form method="post" action="/signup">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control rounded-3" name="uname" placeholder="Choose a username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control rounded-3" name="pwd" placeholder="Choose a password" required>
      </div>
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary rounded-3">Sign Up</button>
      </div>
      <div class="text-center text-muted">
        Already have an account? <a href="/login">Login here</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
